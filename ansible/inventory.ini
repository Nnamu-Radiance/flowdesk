# Remote mode — run from WSL or Linux with SSH key
[production_remote]
lightsail ansible_host=3.77.183.190 ansible_user=bitnami ansible_ssh_private_key_file=~/.ssh/lightsail-eu-central-1.pem

[production_remote:vars]
ansible_python_interpreter=/usr/bin/python3

# Local mode — run directly on the server (ansible-playbook -i inventory.ini production)
[production]
localhost ansible_connection=local

[production:vars]
ansible_python_interpreter=/usr/bin/python3
