---
- name: Install base dependencies
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install packages
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-pip
          - kubectl
          - curl
          - git
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure docker service running
      service:
        name: docker
        state: started
        enabled: yes
