[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests.py test_*.py *_tests.py
testpaths = tests
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --nomigrations
    --cov=apps
    --cov-report=term
    --cov-report=xml
    --cov-fail-under=80

markers =
    slow: marks tests as slow
    integration: marks tests as integration tests
    unit: marks tests as unit tests
