<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User management - FlowDesk</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <style>
    .approver-type-group { display: none; margin-top: 12px; }
    .approver-type-group.visible { display: block; }
    .faculty-group { display: none; margin-top: 12px; }
    .faculty-group.visible { display: block; }
  </style>
</head>
<body>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/shell.js"></script>
  <script>
    const APPROVER_TYPES = [
      { value: 'registrar',       label: 'Registrar' },
      { value: 'dean',            label: 'Dean' },
      { value: 'hod',             label: 'Head of Department' },
      { value: 'admin_assistant', label: 'Administrative Assistant' },
      { value: 'faculty_council', label: 'Faculty Scientific Council' },
      { value: 'dvc',             label: 'Deputy Vice Chancellor' },
      { value: 'supervisor',      label: 'Supervisor (Lecturer)' },
    ];

    const APPROVER_TYPE_LABELS = Object.fromEntries(APPROVER_TYPES.map(t => [t.value, t.label]));

    // Types that require a faculty selection
    const FACULTY_SCOPED_TYPES = new Set(['dean', 'hod', 'admin_assistant']);
    const FACULTIES = ['ICT', 'BMS'];

    function approverTypeOptions(selected) {
      return APPROVER_TYPES.map(t =>
        `<option value="${t.value}" ${t.value === selected ? 'selected' : ''}>${t.label}</option>`
      ).join('');
    }

    function facultyOptions(selected) {
      return FACULTIES.map(f =>
        `<option value="${f}" ${f === selected ? 'selected' : ''}>${f}</option>`
      ).join('');
    }

    function rolePill(user) {
      if (user.role === 'approver' && user.approver_type) {
        const label = APPROVER_TYPE_LABELS[user.approver_type] || user.approver_type;
        const faculty = FACULTY_SCOPED_TYPES.has(user.approver_type) && user.faculty
          ? ` (${user.faculty})` : '';
        return `<span class="pill pill-blue">${label}${faculty}</span>`;
      }
      const map = { admin: 'pill-red', approver: 'pill-blue', submitter: 'pill-gray' };
      return `<span class="pill ${map[user.role] || 'pill-gray'}">${FlowDeskShell.titleCase(user.role)}</span>`;
    }

    function wireApproverTypeVisibility(roleSelectEl, typeGroupEl) {
      function update() {
        const isApprover = roleSelectEl.value === 'approver';
        typeGroupEl.classList.toggle('visible', isApprover);
        typeGroupEl.querySelector('select').required = isApprover;
        if (!isApprover) typeGroupEl.querySelector('select').value = '';
      }
      roleSelectEl.addEventListener('change', update);
      update();
    }

    function wireFacultyVisibility(typeSelectEl, facultyGroupEl) {
      function update() {
        const needs = FACULTY_SCOPED_TYPES.has(typeSelectEl.value);
        facultyGroupEl.classList.toggle('visible', needs);
        facultyGroupEl.querySelector('select').required = needs;
        if (!needs) facultyGroupEl.querySelector('select').value = '';
      }
      typeSelectEl.addEventListener('change', update);
      update();
    }

    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const { root } = await FlowDeskShell.initPage({
          activePage: 'admin-users',
          title: 'User management',
          allowedRoles: ['admin'],
          options: {
            hideNewRequest: true,
            topbarAction: '<button id="add-user" class="btn btn-primary btn-sm" type="button"><i class="ti ti-user-circle" aria-hidden="true"></i> Add user</button>'
          }
        });

        let users = [];
        root.innerHTML = `<section class="card"><div id="users-table">Loading users...</div></section>`;

        async function load() {
          users = FlowDeskShell.results(await AuthAPI.users());
          render();
        }

        function render() {
          document.getElementById('users-table').innerHTML = `
            <table class="tbl">
              <thead>
                <tr>
                  <th>Name</th><th>Email</th><th>Matricule</th>
                  <th>Faculty</th><th>Role</th><th>Status</th><th>Actions</th>
                </tr>
              </thead>
              <tbody>
                ${users.map((user) => `
                  <tr>
                    <td>
                      <span class="u-ava" style="display:inline-grid;margin-right:6px">${FlowDeskShell.initials(user)}</span>
                      ${FlowDeskShell.esc(FlowDeskShell.fullName(user))}
                    </td>
                    <td>${FlowDeskShell.esc(user.email)}</td>
                    <td class="mono">${FlowDeskShell.esc(user.matricule || '-')}</td>
                    <td>${FlowDeskShell.esc(user.faculty || '-')}</td>
                    <td>${rolePill(user)}</td>
                    <td>
                      <span class="pill ${user.is_active ? 'pill-green' : 'pill-gray'}">
                        ${user.is_active ? 'Active' : 'Inactive'}
                      </span>
                    </td>
                    <td>
                      <button class="btn btn-sm btn-secondary" data-role-id="${user.id}" type="button">Edit role</button>
                      <button class="btn btn-sm ${user.is_active ? 'btn-danger' : 'btn-success'}"
                        data-active-id="${user.id}" data-active="${user.is_active ? '0' : '1'}" type="button">
                        ${user.is_active ? 'Deactivate' : 'Activate'}
                      </button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;

          document.querySelectorAll('[data-role-id]').forEach((btn) =>
            btn.addEventListener('click', () =>
              editRole(users.find((u) => Number(u.id) === Number(btn.dataset.roleId)))
            )
          );

          document.querySelectorAll('[data-active-id]').forEach((btn) =>
            btn.addEventListener('click', async () => {
              try {
                if (btn.dataset.active === '0') await api.delete(`/api/auth/users/${btn.dataset.activeId}/`);
                else await api.patch(`/api/auth/users/${btn.dataset.activeId}/`, { is_active: true });
                showToast('User status updated.', 'success');
                load();
              } catch (error) { showToast(error.message, 'error'); }
            })
          );
        }

        function modal(title, body, footer) {
          const wrap = document.createElement('div');
          wrap.className = 'modal-backdrop';
          wrap.innerHTML = `
            <section class="modal">
              <header class="modal-header">
                <strong>${title}</strong>
                <button class="btn btn-sm btn-secondary" data-close type="button"><i class="ti ti-x"></i></button>
              </header>
              <div class="modal-body">${body}</div>
              <footer class="modal-footer">${footer}</footer>
            </section>
          `;
          wrap.addEventListener('click', (e) => {
            if (e.target === wrap || e.target.closest('[data-close]')) wrap.remove();
          });
          document.body.appendChild(wrap);
          return wrap;
        }

        // Edit role modal
        function editRole(user) {
          const currentFaculty = FACULTY_SCOPED_TYPES.has(user.approver_type) ? (user.faculty || '') : '';
          const wrap = modal(
            'Edit role',
            `
              <div class="form-group">
                <label class="form-label">Role</label>
                <select id="role-select" class="form-select">
                  <option value="submitter" ${user.role === 'submitter' ? 'selected' : ''}>Submitter</option>
                  <option value="approver"  ${user.role === 'approver'  ? 'selected' : ''}>Approver</option>
                  <option value="admin"     ${user.role === 'admin'     ? 'selected' : ''}>Admin</option>
                </select>
              </div>
              <div class="form-group approver-type-group" id="edit-type-group">
                <label class="form-label">Approver type <span style="color:var(--color-danger)">*</span></label>
                <select id="approver-type-select" class="form-select">
                  <option value="">— Select type —</option>
                  ${approverTypeOptions(user.approver_type || '')}
                </select>
                <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">
                  Choose "Supervisor (Lecturer)" for teaching staff assigned to students.
                </div>
              </div>
              <div class="form-group faculty-group" id="edit-faculty-group">
                <label class="form-label">Faculty <span style="color:var(--color-danger)">*</span></label>
                <select id="edit-faculty-select" class="form-select">
                  <option value="">— Select faculty —</option>
                  ${facultyOptions(currentFaculty)}
                </select>
                <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">
                  Required for HOD and Administrative Assistant — determines which faculty they oversee.
                </div>
              </div>
            `,
            `<button id="save-role" class="btn btn-primary btn-sm" type="button">Save role</button>`
          );

          wireApproverTypeVisibility(
            wrap.querySelector('#role-select'),
            wrap.querySelector('#edit-type-group')
          );

          wireFacultyVisibility(
            wrap.querySelector('#approver-type-select'),
            wrap.querySelector('#edit-faculty-group')
          );

          wrap.querySelector('#save-role').addEventListener('click', async () => {
            const role = wrap.querySelector('#role-select').value;
            const approverType = wrap.querySelector('#approver-type-select').value;
            const faculty = wrap.querySelector('#edit-faculty-select').value;

            if (role === 'approver' && !approverType) {
              showToast('Please select an approver type.', 'error');
              return;
            }

            if (role === 'approver' && FACULTY_SCOPED_TYPES.has(approverType) && !faculty) {
              showToast('Please select a faculty for this approver type.', 'error');
              return;
            }

            const payload = { role };
            if (role === 'approver') {
              payload.approver_type = approverType;
              if (FACULTY_SCOPED_TYPES.has(approverType)) {
                payload.faculty = faculty;
              }
            }

            try {
              await api.patch(`/api/auth/users/${user.id}/role/`, payload);
              // Also update faculty on the user profile if needed
              if (role === 'approver' && FACULTY_SCOPED_TYPES.has(approverType)) {
                await api.patch(`/api/auth/users/${user.id}/`, { faculty });
              }
              showToast('Role updated.', 'success');
              wrap.remove();
              load();
            } catch (error) { showToast(error.message, 'error'); }
          });
        }

        // Add user modal
        document.getElementById('add-user').addEventListener('click', () => {
          const wrap = modal(
            'Add user',
            `
              <div class="form-row">
                ${inp('Full name', 'full_name')}
                ${inp('Email', 'email', 'email')}
              </div>
              <div class="form-row">
                ${inp('Matricule', 'matricule')}
                ${inp('Phone', 'phone_number', 'tel')}
              </div>
              <div class="form-row">
                ${sel('Faculty', 'faculty', ['ICT', 'BMS', 'Engineering', 'Business', 'Health Sciences', 'Law', 'Sciences'])}
                ${inp('Department / Major', 'department')}
              </div>
              <div class="form-group">
                <label class="form-label">Role</label>
                <select class="form-select" name="role" id="add-role-select">
                  <option value="submitter">Submitter</option>
                  <option value="approver">Approver</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="form-group approver-type-group" id="add-type-group">
                <label class="form-label">Approver type <span style="color:var(--color-danger)">*</span></label>
                <select class="form-select" name="approver_type" id="add-approver-type-select">
                  <option value="">— Select type —</option>
                  ${approverTypeOptions('')}
                </select>
                <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">
                  Required when role is Approver. Choose "Supervisor (Lecturer)" for teaching staff.
                </div>
              </div>
              <div class="form-group faculty-group" id="add-faculty-group">
                <label class="form-label">Faculty (for this role) <span style="color:var(--color-danger)">*</span></label>
                <select class="form-select" id="add-faculty-role-select">
                  <option value="">— Select faculty —</option>
                  ${facultyOptions('')}
                </select>
                <div style="font-size:11px;color:var(--color-text-secondary);margin-top:4px">
                  Required for HOD and Administrative Assistant — determines which faculty they oversee.
                </div>
              </div>
            `,
            `<button id="send-invite" class="btn btn-primary btn-sm" type="button">
               <i class="ti ti-send"></i> Send invitation
             </button>`
          );

          wireApproverTypeVisibility(
            wrap.querySelector('#add-role-select'),
            wrap.querySelector('#add-type-group')
          );

          wireFacultyVisibility(
            wrap.querySelector('#add-approver-type-select'),
            wrap.querySelector('#add-faculty-group')
          );

          wrap.querySelector('#send-invite').addEventListener('click', async () => {
            const role = wrap.querySelector('#add-role-select').value;
            const approverType = wrap.querySelector('#add-approver-type-select').value;
            const facultyForRole = wrap.querySelector('#add-faculty-role-select').value;

            if (role === 'approver' && !approverType) {
              showToast('Please select an approver type.', 'error');
              return;
            }

            if (role === 'approver' && FACULTY_SCOPED_TYPES.has(approverType) && !facultyForRole) {
              showToast('Please select a faculty for this approver type.', 'error');
              return;
            }

            const payload = {};
            wrap.querySelectorAll('[name]').forEach((field) => {
              if (field.name !== 'approver_type') payload[field.name] = field.value;
            });

            if (role === 'approver') {
              payload.approver_type = approverType;
              // Override faculty with the role-specific faculty for HOD/admin_assistant
              if (FACULTY_SCOPED_TYPES.has(approverType)) {
                payload.faculty = facultyForRole;
              }
            }

            try {
              await api.post('/api/auth/users/', payload);
              showToast('User created. Invitation email will be sent when mail is configured.', 'success');
              wrap.remove();
              load();
            } catch (error) { showToast(error.message, 'error'); }
          });
        });

        function inp(label, name, type = 'text') {
          return `<div class="form-group">
            <label class="form-label">${label}</label>
            <input class="form-input" name="${name}" type="${type}">
          </div>`;
        }

        function sel(label, name, options) {
          return `<div class="form-group">
            <label class="form-label">${label}</label>
            <select class="form-select" name="${name}">
              ${options.map((v) => `<option value="${v}">${v}</option>`).join('')}
            </select>
          </div>`;
        }

        await load();
      } catch (error) {
        if (error.message !== 'Not authenticated' && error.message !== 'Access denied') {
          showToast(error.message, 'error');
        }
      }
    });
  </script>
</body>
</html>
