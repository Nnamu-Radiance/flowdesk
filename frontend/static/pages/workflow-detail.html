<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workflow detail - FlowDesk</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body>
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/notifications.js"></script>
  <script src="/static/js/shell.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const id = new URLSearchParams(window.location.search).get('id');
        const { user, root } = await FlowDeskShell.initPage({ activePage: 'workflows', title: 'Workflow detail', allowedRoles: ['submitter', 'admin'] });
        if (!id) {
          window.location.href = FlowDeskShell.dashboardUrl;
          return;
        }

        async function load() {
          const workflow = await WorkflowAPI.get(id);
          if (FlowDeskShell.roleOf(user) === 'submitter' && Number(workflow.created_by_id) !== Number(user.id)) {
            window.location.href = FlowDeskShell.dashboardUrl;
            return;
          }
          const progress = await WorkflowAPI.progress(id).catch(() => ({}));
          const history = await api.get(`/api/approvals/${id}/history/`).catch(() => []);
          render(workflow, progress, FlowDeskShell.results(history));
        }

        function statusPill(status) {
          const map = { approved: 'pill-green', rejected: 'pill-red', in_approval: 'pill-amber', submitted: 'pill-blue', draft: 'pill-gray' };
          return `<span class="pill ${map[status] || 'pill-gray'}">${FlowDeskShell.titleCase(status || 'Unknown')}</span>`;
        }

        function sla(workflow) {
          const pct = Math.min(Number(workflow.sla_percentage || 0), 100);
          const cls = pct >= 100 || workflow.sla_status === 'overdue' ? 'danger' : pct >= 50 ? 'warning' : '';
          return `<div class="sla-bar" style="margin-top:10px"><div class="sla-track"><div class="sla-fill ${cls}" style="width:${pct}%"></div></div><span class="text-gray-500">${FlowDeskShell.esc(workflow.remaining_time || `${pct}%`)}</span></div>`;
        }

        const ACTION_META = {
          approved: { label: 'Approved',             color: '#16a34a', bg: '#f0fdf4', icon: 'ti-check' },
          approve:  { label: 'Approved',             color: '#16a34a', bg: '#f0fdf4', icon: 'ti-check' },
          rejected: { label: 'Rejected',             color: '#dc2626', bg: '#fef2f2', icon: 'ti-x' },
          reject:   { label: 'Rejected',             color: '#dc2626', bg: '#fef2f2', icon: 'ti-x' },
          returned: { label: 'Returned for changes', color: '#d97706', bg: '#fffbeb', icon: 'ti-corner-up-left' },
          return:   { label: 'Returned for changes', color: '#d97706', bg: '#fffbeb', icon: 'ti-corner-up-left' },
        };

        function timelineEntry(r) {
          const m = ACTION_META[r.action] || { label: r.action, color: '#64748b', bg: '#f8fafc', icon: 'ti-point' };
          return `
            <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid #f1f5f9">
              <div style="flex:0 0 30px;text-align:center">
                <div style="width:30px;height:30px;border-radius:50%;background:${m.bg};border:2px solid ${m.color};display:inline-flex;align-items:center;justify-content:center">
                  <i class="ti ${m.icon}" style="font-size:13px;color:${m.color}"></i>
                </div>
              </div>
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                  <span style="font-size:12px;font-weight:600;color:#111827">Step ${r.step_number}</span>
                  <span style="font-size:10px;font-weight:500;padding:1px 7px;border-radius:20px;border:1px solid ${m.color}40;color:${m.color};background:${m.bg}">${m.label}</span>
                  <span style="font-size:10px;color:#94a3b8">${FlowDeskShell.fmtDate(r.created_at)}</span>
                </div>
                <div style="font-size:11px;color:#475569;margin-top:2px">${FlowDeskShell.esc(r.actor_name || 'Office')}</div>
                ${r.comments ? `<div style="margin-top:8px;padding:8px 10px;background:#f8fafc;border-left:3px solid ${m.color};border-radius:0 4px 4px 0;font-size:11px;color:#374151">${FlowDeskShell.esc(r.comments)}</div>` : ''}
                ${r.annotated_document_url ? `<a href="${FlowDeskShell.esc(r.annotated_document_url)}" target="_blank" rel="noopener" class="btn btn-sm btn-secondary" style="margin-top:8px;font-size:11px"><i class="ti ti-download"></i> Annotated document</a>` : ''}
              </div>
            </div>`;
        }

        function pendingEntry(stepNum, office) {
          return `
            <div style="display:flex;gap:12px;padding:12px 0">
              <div style="flex:0 0 30px;text-align:center">
                <div style="width:30px;height:30px;border-radius:50%;background:#f8fafc;border:2px dashed #cbd5e1;display:inline-flex;align-items:center;justify-content:center">
                  <i class="ti ti-clock" style="font-size:13px;color:#94a3b8"></i>
                </div>
              </div>
              <div style="flex:1;padding-top:3px">
                <div style="font-size:12px;font-weight:600;color:#111827">Step ${stepNum}</div>
                <div style="font-size:11px;color:#64748b;margin-top:1px">${FlowDeskShell.esc(office || 'Awaiting assignment')}</div>
                <span style="margin-top:4px;display:inline-block;font-size:10px;color:#d97706;background:#fffbeb;padding:1px 7px;border-radius:20px;border:1px solid #fcd34d">Pending</span>
              </div>
            </div>`;
        }

        function render(workflow, progress, records) {
          const typeName = workflow.workflow_type_detail?.name || workflow.name || workflow.approval_type || 'Workflow';
          const ref = workflow.document?.doc_id || `WF-${workflow.id}`;
          const total = progress.total_steps || workflow.workflow_type_detail?.approval_chain?.length || 0;
          const current = progress.current_step || 0;
          const isTerminal = ['approved', 'rejected', 'returned'].includes(workflow.status);
          const sorted = [...records].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

          let journeyHtml;
          if (!sorted.length) {
            journeyHtml = `
              <div style="padding:24px;text-align:center;color:#64748b">
                <i class="ti ti-clock-hour-4" style="font-size:28px;display:block;margin-bottom:8px;color:#94a3b8"></i>
                <div style="font-size:12px;font-weight:500">${isTerminal ? FlowDeskShell.titleCase(workflow.status) : 'Awaiting first review'}</div>
                ${!isTerminal ? `<div style="font-size:11px;margin-top:4px">${FlowDeskShell.esc(progress.current_office || 'Office not yet assigned')}</div>` : ''}
              </div>`;
          } else {
            journeyHtml = sorted.map(timelineEntry).join('');
            if (!isTerminal && total > 0) {
              journeyHtml += pendingEntry(current, progress.current_office);
            }
          }

          const completedStepCount = new Set(
            sorted.filter(r => r.action === 'approved' || r.action === 'approve').map(r => r.step_number)
          ).size;

          const docs = workflow.documents || (workflow.document ? [workflow.document] : []);
          root.innerHTML = `
            <section class="card">
              <div class="card-hd">
                <div>
                  <h1 style="margin:0;font-size:15px;font-weight:500">${FlowDeskShell.esc(typeName)}</h1>
                  <span class="mono text-gray-500" style="font-size:11px">${FlowDeskShell.esc(ref)}</span>
                </div>
                <div style="display:flex;gap:6px">${statusPill(workflow.status)}<span class="pill pill-gray">${FlowDeskShell.titleCase(workflow.sla_status || 'SLA')}</span></div>
              </div>
              <div class="text-gray-600" style="font-size:11px;margin-top:4px">Submitted ${FlowDeskShell.fmtDate(workflow.submitted_at || workflow.created_at)}</div>
              ${!isTerminal ? sla(workflow) : ''}
            </section>
            <section class="card">
              <div class="card-hd">
                <h2 class="card-title">Approval journey</h2>
                ${total > 0 ? `<span style="font-size:11px;color:#64748b">${completedStepCount} of ${total} step${total !== 1 ? 's' : ''} complete</span>` : ''}
              </div>
              ${journeyHtml}
            </section>
            <section class="card">
              <div class="card-hd"><h2 class="card-title">Your submitted documents</h2></div>
              ${docs.length ? `<table class="tbl"><thead><tr><th>Document</th><th>Uploaded</th><th>Action</th></tr></thead><tbody>${docs.map((doc) => `
                <tr><td>${FlowDeskShell.esc(doc.filename || doc.document_label || 'Document')}</td><td>${FlowDeskShell.fmtDate(doc.uploaded_at || doc.created_at)}</td><td><a class="btn btn-sm btn-secondary" href="/api/workflows/${workflow.id}/documents/${doc.id || doc.doc_id}/download/" target="_blank" rel="noopener">Download</a></td></tr>
              `).join('')}</tbody></table>` : '<p class="text-gray-600" style="font-size:11px">No documents were submitted for this request.</p>'}
            </section>
          `;
        }

        FlowDeskShell.onLive('approval.decision', (payload) => {
          if (Number(payload.workflow_id) === Number(id)) {
            showToast('Workflow updated.', 'info');
            load();
          }
        });
        await load();
      } catch (error) {
        if (error.message !== 'Not authenticated' && error.message !== 'Access denied') showToast(error.message, 'error');
      }
    });
  </script>
</body>
</html>
