<div class="flex flex-col sm:flex-row gap-2">
  <button type="button" class="btn btn-primary btn-sm" onclick="openApprovalAction('{{ workflow.id }}', 'approve')">Approve</button>
  <button type="button" class="btn btn-danger btn-sm" onclick="openApprovalAction('{{ workflow.id }}', 'reject')">Reject</button>
  <button type="button" class="btn btn-secondary btn-sm" onclick="openApprovalAction('{{ workflow.id }}', 'reassign')">Reassign</button>
</div>
