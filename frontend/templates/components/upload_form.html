<form id="upload-form" class="space-y-4">
  <div class="form-group">
    <label class="form-label" for="name">Workflow Name</label>
    <input id="name" name="name" class="form-input" required>
  </div>
  <div class="form-group">
    <label class="form-label" for="document">Document</label>
    <input id="document" name="document" type="file" class="form-input" required>
  </div>
  <div class="form-group">
    <label class="form-label" for="approval_type">Approval Type</label>
    <select id="approval_type" name="approval_type" class="form-input">
      <option value="sequential">Sequential</option>
      <option value="parallel">Parallel</option>
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Create Workflow</button>
</form>
