{% extends 'base.html' %}
{% block title %}Login - FlowDesk{% endblock %}
{% block content %}
<section class="auth-card card">
  <header class="auth-header">
    <p class="text-sm text-blue-700 font-semibold">FlowDesk</p>
    <h1 class="text-2xl font-bold">Sign in to your workspace</h1>
    <p class="text-sm text-gray-600">Use your email address.</p>
  </header>

  <div class="auth-tabs" role="tablist">
    <button type="button" class="auth-tab active" data-auth-panel="password-panel">Sign in</button>
    <button type="button" class="auth-tab" data-auth-panel="signup-panel">Sign up</button>
    <button type="button" class="auth-tab" data-auth-panel="magic-panel">Magic link</button>
  </div>

  <form id="password-panel" class="auth-panel space-y-4">
    <div class="form-group">
      <label for="login-email" class="form-label">Email</label>
      <input id="login-email" name="email" type="email" class="form-input" placeholder="name@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="login-password" class="form-label">Password</label>
      <input id="login-password" name="password" type="password" class="form-input" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary w-full">Sign in</button>
  </form>

  <form id="signup-panel" class="auth-panel hidden space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      <div class="form-group">
        <label for="signup-first-name" class="form-label">First name</label>
        <input id="signup-first-name" name="first_name" type="text" class="form-input" autocomplete="given-name">
      </div>
      <div class="form-group">
        <label for="signup-last-name" class="form-label">Last name</label>
        <input id="signup-last-name" name="last_name" type="text" class="form-input" autocomplete="family-name">
      </div>
    </div>
    <div class="form-group">
      <label for="signup-email" class="form-label">Email</label>
      <input id="signup-email" name="email" type="email" class="form-input" placeholder="name@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="signup-password" class="form-label">Password</label>
      <input id="signup-password" name="password" type="password" class="form-input" autocomplete="new-password" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-primary w-full">Create account</button>
  </form>

  <form id="magic-panel" class="auth-panel hidden space-y-4">
    <div class="form-group">
      <label for="magic-email" class="form-label">Email</label>
      <input id="magic-email" name="email" type="email" class="form-input" placeholder="name@example.com" autocomplete="email" required>
    </div>
    <button type="submit" class="btn btn-primary w-full">Send magic link</button>
  </form>

  <div class="auth-divider">
    <span>or</span>
  </div>

  <a class="btn btn-secondary w-full" href="/api/auth/google/start/">Continue with Google</a>
</section>
{% endblock %}
{% block extra_js %}
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.auth-tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach((item) => item.classList.remove('active'));
        document.querySelectorAll('.auth-panel').forEach((panel) => panel.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.authPanel)?.classList.remove('hidden');
      });
    });

    document.getElementById('password-panel')?.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;
      try {
        await AuthManager.login(email, password);
        window.location.href = AuthManager.getDefaultRedirect();
      } catch (error) {
        showToast(`Sign in failed: ${error.message}`, 'error');
      }
    });

    document.getElementById('signup-panel')?.addEventListener('submit', async (event) => {
      event.preventDefault();
      const payload = {
        first_name: document.getElementById('signup-first-name').value.trim(),
        last_name: document.getElementById('signup-last-name').value.trim(),
        email: document.getElementById('signup-email').value.trim().toLowerCase(),
        password: document.getElementById('signup-password').value,
      };
      try {
        await AuthManager.signup(payload);
        window.location.href = AuthManager.getDefaultRedirect();
      } catch (error) {
        showToast(`Sign up failed: ${error.message}`, 'error');
      }
    });

    document.getElementById('magic-panel')?.addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('magic-email').value.trim().toLowerCase();
      try {
        await AuthManager.requestMagicLink(email);
        showToast('Check your email for a sign-in link.', 'success');
      } catch (error) {
        showToast(`Magic link failed: ${error.message}`, 'error');
      }
    });
  });
</script>
{% endblock %}
