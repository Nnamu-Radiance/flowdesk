{% load static %}
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40">
  <div class="flex items-center gap-3">
    <img src="{% static 'images/logo.svg' %}" alt="FlowDesk" class="h-8 w-8">
    <span class="text-xl font-bold text-blue-700">FlowDesk</span>
  </div>

  <div class="flex items-center gap-4">
    {% if request.path != '/admin/config/' %}
      {% include 'includes/notifications_badge.html' %}
      <span class="text-sm text-gray-700">{{ request.user.get_full_name|default:request.user.username }}</span>
    {% endif %}
    <button onclick="AuthManager.logout()" class="btn btn-sm btn-secondary">Logout</button>
  </div>
</nav>
