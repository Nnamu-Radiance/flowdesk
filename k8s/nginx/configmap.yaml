apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: flowdesk
data:
  nginx.conf: |
    worker_processes auto;

    events { worker_connections 1024; }

    http {
      resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

      server {
        listen 80;
        server_name _;

        set $auth_service http://auth-service.flowdesk.svc.cluster.local:8001;
        set $workflow_service http://workflow-service.flowdesk.svc.cluster.local:8002;
        set $approval_service http://approval-service.flowdesk.svc.cluster.local:8003;
        set $notification_ws http://notification-service.flowdesk.svc.cluster.local:8004;
        set $analytics_service http://analytics-service.flowdesk.svc.cluster.local:8005;

        location /api/auth/ {
          proxy_pass $auth_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/auth/ {
          proxy_pass $auth_service/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflows/ {
          proxy_pass $workflow_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/workflow/ {
          proxy_pass $workflow_service/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/approvals/ {
          proxy_pass $approval_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/approval/ {
          proxy_pass $approval_service/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
          proxy_pass $analytics_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/analytics/ {
          proxy_pass $analytics_service/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/notification/ {
          proxy_pass $notification_ws/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass $notification_ws;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 86400;
        }

        location / {
          return 200 'FlowDesk gateway is running';
          add_header Content-Type text/plain;
        }

        proxy_set_header X-Internal-User "";
        proxy_set_header X-Internal-Role "";
      }
    }
