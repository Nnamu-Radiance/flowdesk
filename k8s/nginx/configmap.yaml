apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: flowdesk
data:
  nginx.conf: |
    worker_processes auto;

    events { worker_connections 1024; }

    http {
      resolver 10.43.0.10 valid=10s ipv6=off;

      server {
        listen 80;
        server_name _;

        set $upstream_auth http://auth-service:8001;
        set $upstream_workflow http://workflow-service:8002;
        set $upstream_approval http://approval-service:8003;
        set $upstream_notification http://notification-service:8004;
        set $upstream_analytics http://analytics-service:8005;

        location /api/auth/ {
          proxy_pass $upstream_auth;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/auth/ {
          proxy_pass $upstream_auth/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflows/ {
          proxy_pass $upstream_workflow;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/workflow/ {
          proxy_pass $upstream_workflow/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/approvals/ {
          proxy_pass $upstream_approval;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/approval/ {
          proxy_pass $upstream_approval/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
          proxy_pass $upstream_analytics;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/analytics/ {
          proxy_pass $upstream_analytics/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/notification/ {
          proxy_pass $upstream_notification/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass $upstream_notification;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 86400;
        }

        location / {
          return 200 'FlowDesk gateway is running';
          add_header Content-Type text/plain;
        }

        proxy_set_header X-Internal-User "";
        proxy_set_header X-Internal-Role "";
      }
    }
