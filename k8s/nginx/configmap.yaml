apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: flowdesk
data:
  nginx.conf: |
    worker_processes auto;

    events { worker_connections 1024; }

    http {
      upstream auth_service { server auth-service:8001; }
      upstream workflow_service { server workflow-service:8002; }
      upstream approval_service { server approval-service:8003; }
      upstream notification_ws { server notification-service:8004; }
      upstream analytics_service { server analytics-service:8005; }

      server {
        listen 80;
        server_name _;

        location /api/auth/ {
          proxy_pass http://auth_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflows/ {
          proxy_pass http://workflow_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/approvals/ {
          proxy_pass http://approval_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
          proxy_pass http://analytics_service;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass http://notification_ws;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 86400;
        }

        location / {
          return 200 'FlowDesk gateway is running';
          add_header Content-Type text/plain;
        }

        proxy_set_header X-Internal-User "";
        proxy_set_header X-Internal-Role "";
      }
    }
