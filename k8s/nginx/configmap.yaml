apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: flowdesk
data:
  nginx.conf: |
    worker_processes auto;

    events { worker_connections 1024; }

    http {
      server {
        listen 80;
        server_name _;

        location /api/auth/ {
          proxy_pass http://auth-service.flowdesk.svc.cluster.local:8001;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/auth/ {
          proxy_pass http://auth-service.flowdesk.svc.cluster.local:8001/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/workflows/ {
          proxy_pass http://workflow-service.flowdesk.svc.cluster.local:8002;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/workflow/ {
          proxy_pass http://workflow-service.flowdesk.svc.cluster.local:8002/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/approvals/ {
          proxy_pass http://approval-service.flowdesk.svc.cluster.local:8003;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/approval/ {
          proxy_pass http://approval-service.flowdesk.svc.cluster.local:8003/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/analytics/ {
          proxy_pass http://analytics-service.flowdesk.svc.cluster.local:8005;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/analytics/ {
          proxy_pass http://analytics-service.flowdesk.svc.cluster.local:8005/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health/notification/ {
          proxy_pass http://notification-service.flowdesk.svc.cluster.local:8004/health/;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass http://notification-service.flowdesk.svc.cluster.local:8004;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 86400;
        }

        location / {
          return 200 'FlowDesk gateway is running';
          add_header Content-Type text/plain;
        }

        proxy_set_header X-Internal-User "";
        proxy_set_header X-Internal-Role "";
      }
    }
