apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: flowdesk
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15-latest
          env:
            - name: POSTGRES_DB
              value: flowdesk_db
            - name: POSTGRES_USER
              value: flowdesk
            - name: POSTGRES_PASSWORD
              value: flowdesk
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: flowdesk
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
