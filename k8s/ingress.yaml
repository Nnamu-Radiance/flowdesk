apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowdesk-ingress
  namespace: flowdesk
spec:
  rules:
    - host: flowdesk.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
