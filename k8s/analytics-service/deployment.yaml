apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: flowdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/"
        prometheus.io/port: "8005"
    spec:
      containers:
        - name: analytics-service
          image: docker.io/flowdesk/analytics-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "python -c 'import django; django.setup(); from django.db import connection; connection.cursor().execute(\"CREATE SCHEMA IF NOT EXISTS analytics_svc\")' && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8005"]
          ports:
            - containerPort: 8005
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.production
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DJANGO_SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: JWT_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DATABASE_URL_ANALYTICS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: flowdesk-config
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: flowdesk-config
                  key: CELERY_BROKER_URL
          livenessProbe:
            httpGet:
              path: /health/
              port: 8005
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/
              port: 8005
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: flowdesk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
