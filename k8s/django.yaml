apiVersion: apps/v1
kind: Deployment
metadata:
  name: django
  namespace: flowdesk
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django
  template:
    metadata:
      labels:
        app: django
    spec:
      containers:
        - name: django
          image: flowdesk/app:latest
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: flowdesk-config
                  key: DEBUG
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DJANGO_SECRET_KEY
            - name: DATABASE_URL
              value: "postgresql://flowdesk:$(POSTGRES_PASSWORD)@postgres:5432/flowdesk_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DATABASE_PASSWORD
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          livenessProbe:
            httpGet:
              path: /metrics/
              port: 8000
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics/
              port: 8000
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: django
  namespace: flowdesk
spec:
  selector:
    app: django
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: django-hpa
  namespace: flowdesk
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: django
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
