apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: flowdesk
spec:
  replicas: 3
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-workflow
          image: docker.io/flowdesk/workflow-service:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "workflow"]
          envFrom:
            - configMapRef:
                name: flowdesk-config
            - secretRef:
                name: flowdesk-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DATABASE_URL_WORKFLOW
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.production
        - name: celery-approval
          image: docker.io/flowdesk/approval-service:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "approval"]
          envFrom:
            - configMapRef:
                name: flowdesk-config
            - secretRef:
                name: flowdesk-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DATABASE_URL_APPROVAL
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.production
        - name: celery-notification
          image: docker.io/flowdesk/notification-service:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "config", "worker", "-l", "info", "-Q", "notification"]
          envFrom:
            - configMapRef:
                name: flowdesk-config
            - secretRef:
                name: flowdesk-secrets
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: flowdesk-secrets
                  key: DATABASE_URL_NOTIFICATION
            - name: DJANGO_SETTINGS_MODULE
              value: config.settings.production
