apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: flowdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: docker.io/flowdesk/approval-service:latest
          command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
          envFrom:
            - configMapRef:
                name: flowdesk-config
            - secretRef:
                name: flowdesk-secrets
